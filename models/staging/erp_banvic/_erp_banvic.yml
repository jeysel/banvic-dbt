sources:
  - name: erp
    description: Banco de dados do sistema ERP da Banvic, com dados de clientes, colaboradores, contas e transações.
    database: dev
    schema: erp_banvic
    tables:
      - name: agencias
        description: Tabela fonte com dados das agencias da Banvic.
        columns:
          - name: cod_agencia
            description: Chave primária da tabela agencias.
            tests:
              - unique
              - not_null

      - name: clientes
        description: Tabela fonte de clientes com informações pessoais dos clientes do banco Banvic.
        columns:
          - name: cod_cliente
            description: Chave primária da tabela clientes.
            tests:
              - unique
              - not_null

      - name: colaboradores
        description: Tabela fonte com dados dos colaboradores da Banvic.
        columns:
          - name: cod_colaborador
            description: Chave primária da tabela colaboradores.
            tests:
              - unique
              - not_null

      - name: colaborador_agencia
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns:
                - cod_colaborador
                - cod_agencia

      - name: contas
        description: Tabela que registra as informações das contas bancárias dos clientes.
        columns:
          - name: num_conta
            tests:
              - unique
              - not_null

      - name: propostas_credito
        description: Tabela que registra as propostas de crédito feitas aos clientes.
        columns:
          - name: cod_transacao
            tests:
              - unique
              - not_null

      - name: transacoes
        description: Tabela que registra as transações realizadas nas contas dos clientes.
        columns:
          - name: cod_transacao
            tests:
              - unique
              - not_null

      - name: localidades
        description: Tabela fonte de localidades com informações de cidade e estado.
        columns:
          - name: cod_localidade
            description: Chave primária da tabela localidades.
            tests:
              - unique
              - not_null