
sources:
  - name: erp
    description: Banco de dados do sistema ERP da Banvic, com dados de clientes, colaboradores, contas e transações.
    database: dev
    schema: erp_banvic
    tables:
     - name: localidades 
       description: Tabela fonte de localidades com informações de cidade e estado.
       columns:
        - name: cod_localidade
          description: Chave primária da tabela localidades.
          data_tests:
            - unique
            - not_null
           
     - name: clientes 
       description: Tabela fonte de clientes com informações pessoais dos clientes do banco Banvic 
       columns:
        - name: cod_cliente
          description: Chave primária da tabela clientes.
          data_tests:
            - unique
            - not_null
    
     - name: colaboradores
       description: Tabela fonte com dados dos colaboradores da Banvic.
       columns:
        - name: cod_colaborador
          description: Chave primária da tabela colaboradores.
          data_tests:
            - unique
            - not_null

     - name: agencias
       description: Tabela fonte com dados das agencias da Banvic.
       columns:
        - name: cod_agencia
          description: Chave primária da tabela agencias.
          data_tests:
            - unique
            - not_null